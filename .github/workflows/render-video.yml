name: Render Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Unique job ID for this render'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg curl jq
      
      - name: Download and process images
        run: |
          mkdir -p slides
          JOB_FILE="jobs/${{ inputs.job_id }}.json"
          
          for i in 0 1 2 3 4; do
            URL=$(jq -r ".slides[$i].image" "$JOB_FILE")
            echo "Downloading slide $i from $URL"
            
            # Download with proper headers
            curl -sL -A "Mozilla/5.0" -o "raw_$i.jpg" "$URL"
            
            # Convert and resize to 1080x1920
            ffmpeg -y -i "raw_$i.jpg" \
              -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920" \
              "slides/slide$i.jpg" 2>/dev/null || \
            ffmpeg -y -f lavfi -i "color=c=black:s=1080x1920:d=1" -frames:v 1 "slides/slide$i.jpg"
            
            ls -la "slides/slide$i.jpg"
          done
      
      - name: Render video
        run: |
          # Create individual video clips from each image (3 seconds each)
          for i in 0 1 2 3 4; do
            ffmpeg -y -loop 1 -i "slides/slide$i.jpg" -t 3 -c:v libx264 -pix_fmt yuv420p -r 30 "clip$i.mp4"
          done
          
          # Create concat list
          echo "file 'clip0.mp4'" > concat.txt
          echo "file 'clip1.mp4'" >> concat.txt
          echo "file 'clip2.mp4'" >> concat.txt
          echo "file 'clip3.mp4'" >> concat.txt
          echo "file 'clip4.mp4'" >> concat.txt
          
          # Concat all clips
          ffmpeg -y -f concat -safe 0 -i concat.txt -c copy output.mp4
          
          ls -la output.mp4
      
      - name: Upload to catbox
        id: upload
        run: |
          RESPONSE=$(curl -sF "reqtype=fileupload" -F "fileToUpload=@output.mp4" https://catbox.moe/user/api.php)
          echo "video_url=$RESPONSE" >> $GITHUB_OUTPUT
          echo "$RESPONSE" > video_url.txt
          echo "Video URL: $RESPONSE"
      
      - name: Save result
        run: |
          mkdir -p results
          VIDEO_URL=$(cat video_url.txt)
          echo "{\"job_id\": \"${{ inputs.job_id }}\", \"video_url\": \"$VIDEO_URL\", \"status\": \"complete\"}" > "results/${{ inputs.job_id }}.json"
      
      - name: Commit result
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git pull --rebase || true
          git add results/
          git commit -m "Render complete: ${{ inputs.job_id }}" || true
          git push || true
      
      - name: Summary
        run: |
          VIDEO_URL=$(cat video_url.txt)
          echo "## ✅ Video Rendered!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $VIDEO_URL" >> $GITHUB_STEP_SUMMARY
