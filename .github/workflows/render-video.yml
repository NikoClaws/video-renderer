name: Render Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Unique job ID for this render'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq imagemagick fonts-dejavu-core
          fc-list | grep -i dejavu | head -3 || echo "Font not in fc-list"
      
      - name: Prepare music track
        run: |
          ls -la music/
          TRACKS=$(ls music/track*.mp3 2>/dev/null | wc -l)
          if [ "$TRACKS" -eq 0 ]; then
            echo "No tracks found!"
            exit 1
          fi
          HASH=$(echo "${{ inputs.job_id }}" | md5sum | cut -c1-8)
          INDEX=$((16#$HASH % $TRACKS + 1))
          TRACK="music/track${INDEX}.mp3"
          echo "Selected: $TRACK"
          cp "$TRACK" music.mp3
          ffmpeg -y -i music.mp3 -t 15 -af "afade=t=in:st=0:d=0.5,afade=t=out:st=13:d=2,volume=1.5" music_trimmed.mp3
          ls -la music_trimmed.mp3
      
      - name: Download and process images
        run: |
          mkdir -p slides
          JOB_FILE="jobs/${{ inputs.job_id }}.json"
          
          for idx in 0 1 2 3 4; do
            URL=$(jq -r ".slides[$idx].image" "$JOB_FILE")
            RAW="raw_${idx}.jpg"
            SLIDE="slides/slide${idx}.jpg"
            
            echo "=== Slide $idx ==="
            echo "URL: $URL"
            
            curl -sL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
              -o "$RAW" "$URL"
            
            if [ -f "$RAW" ]; then
              SIZE=$(stat -c%s "$RAW" 2>/dev/null || echo 0)
              echo "Downloaded: $SIZE bytes"
              
              if [ "$SIZE" -gt 5000 ]; then
                ffmpeg -y -i "$RAW" \
                  -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920" \
                  "$SLIDE" 2>&1 | tail -2
                
                if [ ! -f "$SLIDE" ]; then
                  convert "$RAW" -resize 1080x1920^ -gravity center -extent 1080x1920 "$SLIDE"
                fi
              else
                convert -size 1080x1920 -define gradient:angle=135 gradient:'#1a1a2e'-'#16213e' "$SLIDE"
              fi
            else
              convert -size 1080x1920 -define gradient:angle=135 gradient:'#1a1a2e'-'#16213e' "$SLIDE"
            fi
            
            ls -la "$SLIDE"
          done
      
      - name: Create animated slides with text
        run: |
          JOB_FILE="jobs/${{ inputs.job_id }}.json"
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          FONT_REG="/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"
          PINK="0xE91E63"
          
          ANIMS=("zoom_in" "zoom_out" "pan_right" "ken_burns")
          
          for i in 0 1 2 3 4; do
            ANIM=${ANIMS[$i % 4]}
            
            # New structured format: line1 (white), line2 (pink), line3 (white), subtitle (grey)
            LINE1=$(jq -r ".slides[$i].line1 // empty" "$JOB_FILE")
            LINE2=$(jq -r ".slides[$i].line2 // empty" "$JOB_FILE")
            LINE3=$(jq -r ".slides[$i].line3 // empty" "$JOB_FILE")
            SUBTITLE=$(jq -r ".slides[$i].subtitle // empty" "$JOB_FILE")
            
            # Fallback for old "text" field format
            if [ -z "$LINE1" ] && [ -z "$LINE2" ]; then
              OLD_TEXT=$(jq -r ".slides[$i].text // empty" "$JOB_FILE")
              if [ -n "$OLD_TEXT" ]; then
                LINE1="$OLD_TEXT"
              fi
            fi
            
            echo "Slide $i: L1='$LINE1' L2='$LINE2' L3='$LINE3' Sub='$SUBTITLE'"
            
            # Zoompan
            case $ANIM in
              zoom_in)  ZP="zoompan=z='min(zoom+0.002,1.25)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=90:s=1080x1920:fps=30" ;;
              zoom_out) ZP="zoompan=z='if(lte(zoom,1.0),1.25,max(1.001,zoom-0.002))':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=90:s=1080x1920:fps=30" ;;
              pan_right) ZP="zoompan=z='1.15':x='if(lte(on,1),0,min(x+3,iw-iw/zoom))':y='ih/2-(ih/zoom/2)':d=90:s=1080x1920:fps=30" ;;
              ken_burns) ZP="zoompan=z='min(zoom+0.0012,1.15)':x='iw/2-(iw/zoom/2)+sin(on/25)*15':y='ih/2-(ih/zoom/2)':d=90:s=1080x1920:fps=30" ;;
            esac
            
            # Escape for FFmpeg drawtext
            esc() { echo "$1" | sed "s/'/'\\\\\\\\''/g" | sed 's/:/\\:/g' | sed 's/%/%%/g'; }
            
            S1=$(esc "$LINE1")
            S2=$(esc "$LINE2")
            S3=$(esc "$LINE3")
            S4=$(esc "$SUBTITLE")
            
            # Header bar
            HEADER="drawbox=x=0:y=0:w=1080:h=90:c=${PINK}:t=fill,drawtext=text='ASIANBUS NEWS':fontsize=42:fontcolor=white:x=30:y=28:fontfile=${FONT}"
            CTR="drawtext=text='$((i+1))/5':fontsize=32:fontcolor=white:x=w-90:y=32:fontfile=${FONT}"
            
            # BREAKING badge (slide 1 only)
            BADGE=""
            if [ $i -eq 0 ]; then
              BADGE=",drawbox=x=40:y=130:w=200:h=55:c=red:t=fill,drawtext=text='BREAKING':fontsize=32:fontcolor=white:x=75:y=140:fontfile=${FONT}"
            fi
            
            # Headline text - stacked centered lines, no dark box
            TXT=""
            BY=780
            if [ -n "$S1" ]; then
              TXT="${TXT},drawtext=text='${S1}':fontsize=64:fontcolor=white:x=(w-text_w)/2:y=${BY}:fontfile=${FONT}:shadowcolor=black@0.8:shadowx=4:shadowy=4"
            fi
            if [ -n "$S2" ]; then
              BY2=$((BY+80))
              TXT="${TXT},drawtext=text='${S2}':fontsize=68:fontcolor=${PINK}:x=(w-text_w)/2:y=${BY2}:fontfile=${FONT}:shadowcolor=black@0.8:shadowx=4:shadowy=4"
            fi
            if [ -n "$S3" ]; then
              BY3=$((BY+160))
              TXT="${TXT},drawtext=text='${S3}':fontsize=64:fontcolor=white:x=(w-text_w)/2:y=${BY3}:fontfile=${FONT}:shadowcolor=black@0.8:shadowx=4:shadowy=4"
            fi
            if [ -n "$S4" ]; then
              BY4=$((BY+240))
              TXT="${TXT},drawtext=text='${S4}':fontsize=38:fontcolor=0xCCCCCC:x=(w-text_w)/2:y=${BY4}:fontfile=${FONT_REG}:shadowcolor=black@0.7:shadowx=2:shadowy=2"
            fi
            
            # CTA on last slide only
            CTA=""
            if [ $i -eq 4 ]; then
              CTA=",drawbox=x=240:y=1680:w=600:h=80:c=${PINK}:t=fill,drawtext=text='LINK IN BIO':fontsize=36:fontcolor=white:x=(w-text_w)/2:y=1695:fontfile=${FONT}"
            fi
            
            FILTER="${ZP},${HEADER},${CTR}${BADGE}${TXT}${CTA}"
            
            ffmpeg -y -i "slides/slide$i.jpg" \
              -vf "$FILTER" \
              -t 3 -c:v libx264 -pix_fmt yuv420p -r 30 \
              "clip$i.mp4" 2>&1 || echo "FFMPEG FAILED for slide $i"
            
            ls -la "clip$i.mp4" || echo "NO CLIP CREATED"
          done
      
      - name: Add transitions and combine
        run: |
          for i in 0 1 2 3; do
            ffmpeg -y -i "clip$i.mp4" -vf "fade=t=out:st=2.7:d=0.3" -c:v libx264 -c:a copy "clip${i}_fade.mp4"
          done
          cp clip4.mp4 clip4_fade.mp4
          
          cp clip0_fade.mp4 clip0_final.mp4
          for i in 1 2 3 4; do
            ffmpeg -y -i "clip${i}_fade.mp4" -vf "fade=t=in:st=0:d=0.3" -c:v libx264 -c:a copy "clip${i}_final.mp4"
          done
          
          for i in 0 1 2 3 4; do echo "file 'clip${i}_final.mp4'"; done > concat.txt
          ffmpeg -y -f concat -safe 0 -i concat.txt -c copy video_no_audio.mp4
          ls -la video_no_audio.mp4
      
      - name: Add music and finalize
        run: |
          ffmpeg -y -i video_no_audio.mp4 -i music_trimmed.mp3 \
            -c:v copy -c:a aac -b:a 192k \
            -map 0:v:0 -map 1:a:0 -shortest \
            output.mp4
          
          ls -la output.mp4
          ffprobe -v error -show_entries format=duration -of csv=p=0 output.mp4
      
      - name: Upload to catbox
        id: upload
        run: |
          RESPONSE=$(curl -sF "reqtype=fileupload" -F "fileToUpload=@output.mp4" https://catbox.moe/user/api.php)
          echo "video_url=$RESPONSE" >> $GITHUB_OUTPUT
          echo "$RESPONSE" > video_url.txt
          echo "Video URL: $RESPONSE"
      
      - name: Summary
        run: |
          VIDEO_URL=$(cat video_url.txt)
          echo "## ✅ Video Rendered!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $VIDEO_URL" >> $GITHUB_STEP_SUMMARY
