name: Render Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Unique job ID for this render'
        required: true
      callback_url:
        description: 'URL to POST result to (optional)'
        required: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq
      
      - name: Download fonts
        run: |
          mkdir -p fonts
          curl -sL -o fonts/BebasNeue-Regular.ttf "https://github.com/dharmatype/Bebas-Neue/raw/master/fonts/BebasNeue-Regular.ttf"
          curl -sL -o fonts/Poppins-Bold.ttf "https://github.com/poppins/fonts/raw/master/Poppins-Bold.ttf" || \
            curl -sL -o fonts/Poppins-Bold.ttf "https://raw.githubusercontent.com/google/fonts/main/ofl/poppins/Poppins-Bold.ttf"
      
      - name: Read job spec
        id: spec
        run: |
          JOB_FILE="jobs/${{ inputs.job_id }}.json"
          if [ ! -f "$JOB_FILE" ]; then
            echo "Job file not found: $JOB_FILE"
            exit 1
          fi
          echo "spec=$(cat $JOB_FILE | jq -c .)" >> $GITHUB_OUTPUT
      
      - name: Download images
        run: |
          mkdir -p images
          JOB_FILE="jobs/${{ inputs.job_id }}.json"
          for i in $(seq 0 4); do
            URL=$(jq -r ".slides[$i].image" "$JOB_FILE")
            if [ "$URL" != "null" ] && [ -n "$URL" ]; then
              curl -sL -o "images/slide$i.jpg" "$URL"
            fi
          done
          ls -la images/
      
      - name: Create slides
        run: |
          JOB_FILE="jobs/${{ inputs.job_id }}.json"
          HEADLINE=$(jq -r '.headline' "$JOB_FILE")
          
          for i in $(seq 0 4); do
            SLIDE_TEXT=$(jq -r ".slides[$i].text // \"\"" "$JOB_FILE")
            
            # Create slide with overlay, branding, and text
            ffmpeg -y -i "images/slide$i.jpg" \
              -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,
                   drawbox=x=0:y=0:w=1080:h=120:color=0xE91E63@0.9:t=fill,
                   drawtext=fontfile=fonts/BebasNeue-Regular.ttf:text='ASIANBUS NEWS':fontsize=48:fontcolor=white:x=(w-text_w)/2:y=40,
                   drawbox=x=0:y=0:w=1080:h=1920:color=black@0.3:t=fill,
                   drawtext=fontfile=fonts/BebasNeue-Regular.ttf:text='${SLIDE_TEXT}':fontsize=72:fontcolor=white:x=(w-text_w)/2:y=(h-text_h)/2:line_spacing=20" \
              -q:v 2 "slides/slide$i.jpg"
          done 2>/dev/null || true
          
          mkdir -p slides
          # Fallback: just copy and resize if ffmpeg text fails
          for i in $(seq 0 4); do
            if [ ! -f "slides/slide$i.jpg" ]; then
              ffmpeg -y -i "images/slide$i.jpg" -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920" "slides/slide$i.jpg"
            fi
          done
          ls -la slides/
      
      - name: Render video with animation
        run: |
          JOB_FILE="jobs/${{ inputs.job_id }}.json"
          STYLE=$(jq -r '.animation_style // "zoom_in"' "$JOB_FILE")
          
          # Create video from slides (3 seconds each = 15 second video)
          ffmpeg -y -framerate 1/3 -i "slides/slide%d.jpg" \
            -vf "zoompan=z='min(zoom+0.001,1.1)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=90:s=1080x1920:fps=30" \
            -c:v libx264 -pix_fmt yuv420p -t 15 \
            output.mp4
          
          ls -la output.mp4
      
      - name: Upload to catbox
        id: upload
        run: |
          RESPONSE=$(curl -sF "reqtype=fileupload" -F "fileToUpload=@output.mp4" https://catbox.moe/user/api.php)
          echo "Video URL: $RESPONSE"
          echo "video_url=$RESPONSE" >> $GITHUB_OUTPUT
      
      - name: Save result
        run: |
          mkdir -p results
          echo '{"job_id": "${{ inputs.job_id }}", "video_url": "${{ steps.upload.outputs.video_url }}", "status": "complete"}' > "results/${{ inputs.job_id }}.json"
          cat "results/${{ inputs.job_id }}.json"
      
      - name: Commit result
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add results/
          git commit -m "Render complete: ${{ inputs.job_id }}" || true
          git push || true
      
      - name: Output result
        run: |
          echo "✅ Video rendered successfully!"
          echo "📹 URL: ${{ steps.upload.outputs.video_url }}"
